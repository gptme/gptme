name: Release

# Central release handler — every release (manual or scheduled) flows through here.
#
# Triggers:
#   - release: created  — from manual `make release-*` (user credentials fire this event)
#   - workflow_dispatch  — from scheduled-release.yml (GITHUB_TOKEN can't fire release:created)
#
# Does: Build + upload Python packages, publish to PyPI, trigger build + tauri workflows.

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g., v0.31.1.dev20260310)'
        required: true

permissions:
  contents: write
  actions: write

jobs:
  publish:
    name: Publish release
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ inputs.tag || github.ref_name }}

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install poetry

    - name: Build Python packages
      run: |
        rm -f dist/*.whl dist/*.tar.gz
        poetry build

    - name: Upload packages to GitHub release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        TAG="${{ inputs.tag || github.ref_name }}"
        gh release upload "$TAG" dist/*.whl dist/*.tar.gz --clobber

    - name: Publish to PyPI
      env:
        PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
      run: poetry publish --username=__token__ --password=$PYPI_TOKEN

    - name: Trigger artifact builds
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        TAG="${{ inputs.tag || github.ref_name }}"
        echo "Triggering Build workflow for ${TAG}..."
        gh workflow run build.yml -f tag="${TAG}"
        echo "Triggering Tauri workflow for ${TAG}..."
        gh workflow run tauri.yml -f tag="${TAG}"
